<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join OpenLearn — Build real skills. Sign up or log in to track your learning.">
    <title>OpenLearn | Sign Up</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
    
    <style>
        .signup-page {
            background-color: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-xl) var(--space-md);
        }

        .auth-card {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            box-shadow: 0 12px 36px rgba(17, 17, 17, 0.05);
            width: 100%;
            max-width: 440px;
            padding: var(--space-lg);
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
            transition: transform var(--transition);
        }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: var(--space-xs);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color var(--transition), border-color var(--transition);
        }

        .auth-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--bg-dark);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .form-label {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-input {
            padding: 0.75rem 1rem;
            font-size: 0.9375rem;
            font-family: inherit;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            outline: none;
            background-color: #ffffff;
            transition: border-color var(--transition), box-shadow var(--transition);
            color: var(--text-primary);
        }

        .form-input:focus {
            border-color: var(--bg-dark);
            box-shadow: 0 0 0 3px rgba(13, 13, 13, 0.05);
        }

        .form-checkbox-row {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
            margin-top: 0.25rem;
        }

        .form-checkbox-row input {
            margin-top: 0.25rem;
            cursor: pointer;
        }

        .auth-error-msg {
            font-size: 0.8125rem;
            color: #a30000;
            background-color: rgba(163, 0, 0, 0.04);
            border-left: 3px solid #a30000;
            padding: 0.6rem 0.8rem;
            border-radius: 4px;
            display: none;
        }

        .auth-submit-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.85rem;
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--bg-light);
            background-color: var(--bg-dark);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: opacity var(--transition);
            margin-top: 0.5rem;
        }

        .auth-submit-btn:hover {
            opacity: 0.88;
        }

        .auth-footer {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.5;
            margin-top: var(--space-xs);
        }

        .auth-footer a {
            color: var(--text-primary);
            font-weight: 600;
            text-decoration: underline;
        }

        .auth-footer a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body class="signup-page">

    <!-- Header Navbar -->
    <header class="site-header">
        <nav class="navbar" aria-label="Main navigation">
            <a class="navbar-logo" href="index.html" aria-label="OpenLearn home">
                <img src="assets/logo.png" alt="" width="56" height="56">
                <span class="navbar-brand-text">OpenLearn</span>
            </a>

            <ul class="navbar-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="careers.html">Careers</a></li>
                <li><a href="about.html">About</a></li>
            </ul>

            <a class="btn-sign-in" href="signup.html" style="background-color: var(--bg-dark); color: var(--bg-light); border-color: var(--bg-dark);">Sign Up</a>
        </nav>
    </header>

    <!-- Centered Form Card Container -->
    <main class="auth-container">
        <div class="auth-card">
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tabSignup" onclick="setAuthMode('signup')">Create Account</div>
                <div class="auth-tab" id="tabSignin" onclick="setAuthMode('signin')">Welcome Back</div>
            </div>

            <div class="auth-error-msg" id="authErrorMsg"></div>

            <form class="auth-form" id="authForm" onsubmit="handleAuthSubmit(event)">
                <!-- Full Name Field -->
                <div class="form-group" id="groupName">
                    <label class="form-label" for="authName">Full Name</label>
                    <input type="text" id="authName" class="form-input" placeholder="e.g. Suryansh Dev" autocomplete="name">
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label class="form-label" for="authEmail">Email Address</label>
                    <input type="email" id="authEmail" class="form-input" placeholder="e.g. suryansh@gmail.com" autocomplete="email" required>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label class="form-label" for="authPassword">Password</label>
                    <input type="password" id="authPassword" class="form-input" placeholder="••••••••" autocomplete="current-password" required minlength="6">
                </div>

                <!-- Terms checkbox (signup only) -->
                <label class="form-checkbox-row" id="groupTerms">
                    <input type="checkbox" id="authTerms" checked>
                    <span>I agree to OpenLearn's Terms of Service and Privacy Policy.</span>
                </label>

                <!-- Submit Button -->
                <button type="submit" class="auth-submit-btn" id="authSubmitBtn">Create Account</button>
            </form>

            <div class="auth-footer" id="authFooter">
                Already have an account? <a href="#" onclick="event.preventDefault(); setAuthMode('signin')">Sign In</a>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="footer-section">
        <div class="footer-bottom">
            <p>&copy; 2026 OpenLearn. All rights reserved.</p>
        </div>
    </footer>

    <!-- Form Logic -->
    <script>
        let currentMode = 'signup';

        // Check if user is already logged in, redirect to dashboard if so
        if (localStorage.getItem("openlearn-logged-in") === "true") {
            window.location.href = "student-dashboard.html";
        }

        function setAuthMode(mode) {
            currentMode = mode;
            const tabSignup = document.getElementById('tabSignup');
            const tabSignin = document.getElementById('tabSignin');
            const groupName = document.getElementById('groupName');
            const groupTerms = document.getElementById('groupTerms');
            const authSubmitBtn = document.getElementById('authSubmitBtn');
            const authFooter = document.getElementById('authFooter');
            const errorMsg = document.getElementById('authErrorMsg');

            errorMsg.style.display = 'none';

            if (mode === 'signup') {
                tabSignup.classList.add('active');
                tabSignin.classList.remove('active');
                groupName.style.display = 'flex';
                groupTerms.style.display = 'flex';
                authSubmitBtn.textContent = 'Create Account';
                authFooter.innerHTML = `Already have an account? <a href="#" onclick="event.preventDefault(); setAuthMode('signin')">Sign In</a>`;
                document.getElementById('authName').required = true;
            } else {
                tabSignup.classList.remove('active');
                tabSignin.classList.add('active');
                groupName.style.display = 'none';
                groupTerms.style.display = 'none';
                authSubmitBtn.textContent = 'Sign In';
                authFooter.innerHTML = `Don't have an account yet? <a href="#" onclick="event.preventDefault(); setAuthMode('signup')">Sign Up</a>`;
                document.getElementById('authName').required = false;
            }
        }

        function handleAuthSubmit(event) {
            event.preventDefault();
            const errorMsg = document.getElementById('authErrorMsg');
            errorMsg.style.display = 'none';

            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;

            if (currentMode === 'signup') {
                const name = document.getElementById('authName').value.trim();
                const terms = document.getElementById('authTerms').checked;

                if (!name) {
                    showError("Please enter your full name.");
                    return;
                }

                if (!terms) {
                    showError("You must agree to the Terms of Service.");
                    return;
                }

                // Register user in localStorage
                localStorage.setItem("openlearn-student-name", name);
                localStorage.setItem("openlearn-student-email", email);
                localStorage.setItem("openlearn-student-password", password); // Simple mock
                localStorage.setItem("openlearn-logged-in", "true");
                
                // Initialize default stats if not already set
                if (!localStorage.getItem("openlearn-streak")) {
                    localStorage.setItem("openlearn-streak", "1");
                }
                if (!localStorage.getItem("openlearn-daily-goal")) {
                    localStorage.setItem("openlearn-daily-goal", "30");
                }
                if (!localStorage.getItem("openlearn-daily-progress")) {
                    localStorage.setItem("openlearn-daily-progress", "0");
                }

                // Redirect
                window.location.href = "student-dashboard.html";

            } else {
                // Sign In mode
                const registeredEmail = localStorage.getItem("openlearn-student-email");
                const registeredPassword = localStorage.getItem("openlearn-student-password");

                if (!registeredEmail) {
                    showError("No account found with this email. Please Sign Up first.");
                    return;
                }

                if (email.toLowerCase() !== registeredEmail.toLowerCase() || password !== registeredPassword) {
                    showError("Incorrect email address or password.");
                    return;
                }

                // Successful login
                localStorage.setItem("openlearn-logged-in", "true");
                window.location.href = "student-dashboard.html";
            }
        }

        function showError(message) {
            const errorMsg = document.getElementById('authErrorMsg');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }

        // Initialize form mode requirement
        document.getElementById('authName').required = true;
    </script>
</body>
</html>

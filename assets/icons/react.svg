<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Official React Logo: Electron Orbits -->
  <defs>
    <linearGradient id="reactGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61dafb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="22" fill="url(#reactGradient)"/>
  <!-- React nucleus and electron orbits -->
  <g transform="translate(24, 24)">
    <!-- Central nucleus -->
    <circle cx="0" cy="0" r="2" fill="#111111"/>
    <!-- Three electron orbits -->
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="none" stroke="#111111" stroke-width="1.2" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="none" stroke="#111111" stroke-width="1.2" opacity="0.8" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="none" stroke="#111111" stroke-width="1.2" opacity="0.8" transform="rotate(120)"/>
    <!-- Electron dots -->
    <circle cx="8" cy="0" r="1.2" fill="#111111"/>
    <circle cx="-4" cy="6.9" r="1.2" fill="#111111"/>
    <circle cx="-4" cy="-6.9" r="1.2" fill="#111111"/>
  </g>
</svg>

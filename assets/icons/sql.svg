<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Official SQL Logo: Database -->
  <defs>
    <linearGradient id="sqlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc2927;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#992622;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="22" fill="url(#sqlGradient)"/>
  <!-- Database cylinder -->
  <g transform="translate(24, 24)">
    <!-- Top ellipse -->
    <ellipse cx="0" cy="-5" rx="6" ry="2.5" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Sides -->
    <line x1="-6" y1="-5" x2="-6" y2="6" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="6" y1="-5" x2="6" y2="6" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Bottom ellipse -->
    <ellipse cx="0" cy="6" rx="6" ry="2.5" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Middle band -->
    <ellipse cx="0" cy="0" rx="6" ry="2.5" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  </g>
</svg>

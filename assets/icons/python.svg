<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Official Python Logo: Two intertwined snakes -->
  <defs>
    <linearGradient id="pythonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3776ab;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd43b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="url(#pythonGradient)"/>
  <!-- Two interlocking snakes representing Python -->
  <g transform="translate(24, 24)">
    <!-- Upper snake head -->
    <circle cx="-3" cy="-8" r="3.5" fill="#ffffff"/>
    <path d="M -3,-4.5 Q -6,-2 -8,2 Q -9,5 -7,8" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Lower snake head -->
    <circle cx="3" cy="8" r="3.5" fill="#ffffff"/>
    <path d="M 3,4.5 Q 6,2 8,-2 Q 9,-5 7,-8" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
